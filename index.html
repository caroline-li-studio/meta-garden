<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元花园 - 已经灭绝物种的数字花园</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 3D Garden Canvas -->
        <div id="garden-container" class="garden-container-3d">
            <div class="header-overlay">
                <h1 class="title" id="main-title">元花园</h1>
                <p class="subtitle" id="main-subtitle">珍藏那些已经消失的生命</p>
                <div class="language-switcher" id="lang-switcher">
                    <button class="lang-btn active" data-lang="zh">中文</button>
                    <button class="lang-btn" data-lang="en">English</button>
                </div>
                <p class="hint">移动鼠标转动视角 · 点击物种查看详情</p>
            </div>
        </div>

        <!-- Detail Panel -->
        <div id="detail-panel" class="detail-panel hidden">
            <button id="back-btn" class="back-button">← 返回花园</button>
            <div class="detail-content">
                <div class="detail-image-container">
                    <img id="detail-image" class="detail-image" alt="" src="">
                </div>
                <div class="detail-info">
                    <h2 id="detail-name" class="species-name"></h2>
                    <p class="scientific-name" id="detail-scientific"></p>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <label>类型</label>
                            <span id="detail-type"></span>
                        </div>
                        <div class="info-item">
                            <label>灭绝年份</label>
                            <span id="detail-extinct"></span>
                        </div>
                        <div class="info-item">
                            <label>栖息地</label>
                            <span id="detail-habitat"></span>
                        </div>
                        <div class="info-item">
                            <label>分布区域</label>
                            <span id="detail-region"></span>
                        </div>
                    </div>

                    <div class="description" id="detail-description"></div>

                    <div class="facts" id="detail-facts"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Import Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
